openapi: 3.0.0
info:
  title: GMR_SOCKET.IO_API DOCS
  version: 1.0.0
  description: Full API documentation for GMR Socket.IO backend services.

servers:
  - url: http://localhost:3001
    description: Local development server
  - url: http://localhost:8000
    description: Proxy server (Load Balancer)

tags:
  - name: Health
    description: Health check APIs
  - name: Account
    description: Account authentication APIs
  - name: Chat
    description: Chat-related APIs
  - name: Group
    description: Groups-related APIs
  - name: User
    description: User-related APIs

security:
  - BearerAuth: []
  - ClientIdHeader: []

paths:
  /account/health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      responses:
        "200":
          description: Returns a greeting message

  /account/login:
    post:
      tags:
        - Account
      summary: Login to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDataModel"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/UserDto"
        "400":
          description: Login failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string

  /account/register:
    post:
      tags:
        - Account
      summary: Register a new user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UserDataModel"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserDto"
        "400":
          description: Registration failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Username already taken"
                  error:
                    type: string
                    example: "Some error occurred"

  /chat/private:
    post:
      summary: Initiates or fetches a one-to-one chat with a user.
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  example: 42
      responses:
        200:
          description: Chat created or retrieved successfully.
        400:
          description: Invalid request payload.
        500:
          description: Internal server error.

  /chat/group:
    post:
      summary: Creates a new group chat.
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupDataModel"
      responses:
        200:
          description: Group chat created successfully.
        400:
          description: Invalid request payload.
        500:
          description: Internal server error.

  /chat/action:
    post:
      summary: Executes a specific chat action (e.g., typing, read).
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatActionDataModel'
      responses:
        200:
          description: Action processed successfully.
        400:
          description: Invalid request payload.
        500:
          description: Internal server error.

  /group/invite:
    post:
      summary: Invite a user to a group chat
      tags:
        - Group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupInviteDataModel'
      responses:
        200:
          description: Invitation sent successfully
        400:
          description: Bad request or invalid input
        500:
          description: Internal server error

  /group/action:
    patch:
      summary: Accept or decline a group invitation
      tags:
        - Group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupInviteActionDataModel'
      responses:
        200:
          description: Invitation action processed successfully
        400:
          description: Bad request or invalid action
        500:
          description: Internal server error

components:
  schemas:
    LoginDataModel:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "user@example.com"
        password:
          type: string
          example: "password123"
        rememberMe:
          type: boolean
          example: false

    UserDataModel:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
        - confirmPassword
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        confirmPassword:
          type: string
        profilePicture:
          type: string
          format: binary

    GroupDataModel:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Project Team"
        description:
          type: string
          example: "Group for all project members"
        participant:
          type: array
          items:
            type: integer
          example: [1, 2, 3]

    ChatActionDataModel:
      type: object
      required:
        - type
        - chatId
        - userId
        - action
      properties:
        type:
          type: string
          enums: ("P" or "G")
          example: "Use P for private and G group"
        chatId:
          type: integer
          example: 123
        userId:
          type: integer
          example: 123
        action:
          type: string
          enums: ("LEAVE" | "ADMIN" | "MUTE" | "ARCHIVE" | "BLOCK" | "REMOVED")
          example: "REMOVED"

    GroupInviteDataModel:
      type: object
      required:
        - chatId
        - type
        - invitedUser
      properties:
        chatId:
          type: integer
          example: 1
        type:
          type: string
          enums: ("P" or "G")
          example: "Use P for private and G group" 
        invitedUser:
          type: array
          items:
            type: integer
          example: [2, 3, 4]

    GroupInviteActionDataModel:
      type: object
      required:
        - chatId
        - userId
        - status
      properties:
        chatId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 3
        status:
          type: string
          enums: ("ACCEPTED" or "DECLINED")
          example: "DECLINED"


  # DTO

    UserDto:
      type: object
      required:
        - id
        - guid
        - firstName
        - lastName
        - email
        - isActive
      properties:
        id:
          type: integer
          example: 1
        guid:
          type: string
          example: 7d3e663a9-bb3-4a9cb0f11-9dce-cc9d270
        firstName:
          type: string
          example: "John"
        lastName:
          type: string
          example: "Deo"
        email:
          type: string
          example: "mail@mail.com"
        profilePicture:
          type: File
          example: "binary"
        isActive:
          type: boolean
          example: "false"
        isDeleted:
          type: boolean
          example: "false"
        token:
          type: string
          example: "eyvVCJ9.eyJMDEifQ.QDmJ5E_a8ZzH0"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    ClientIdHeader:
      type: apiKey
      in: header
      name: clientid
