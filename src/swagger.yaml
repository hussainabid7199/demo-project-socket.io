openapi: 3.0.0
info:
  title: GMR_SOCKET.IO_API DOCS
  version: 1.0.0
  description: Full API documentation for GMR Socket.IO backend services.

servers:
  - url: http://localhost:3001
    description: Local development server

tags:
  - name: Health
    description: Health check APIs
  - name: Account
    description: Account authentication APIs
  - name: Chat
    description: Chat-related APIs
  - name: User
    description: User-related APIs

security:
  - BearerAuth: []
  - ClientIdHeader: []

paths:

  /account/health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      responses:
        '200':
          description: Returns a greeting message

  /account/login:
    post:
      tags:
        - Account
      summary: Login to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "user@example.com"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
        '400':
          description: Login failed

  /account/register:
    post:
      tags:
        - Account
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSchema'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Registration successful"
                  data:
                    $ref: '#/components/schemas/UserDto'
        '400':
          description: Registration failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Username already taken"
                  error:
                    type: object
                    nullable: true
                    example: null

  /chat/send:
    post:
      tags:
        - Chat
      summary: Send a message to a specific socket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: number
                  example: 1
                socketId:
                  type: string
                  example: "vIU4TYqs0m68zsCWAAAR"
                message:
                  type: string
                  example: "Hello from Swagger!"
      responses:
        '201':
          description: Message sent to specific socket
          content:
            application/json:
              schema:
                type: boolean

  /chat/broadcast:
    post:
      tags:
        - Chat
      summary: Broadcast a message to all sockets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Broadcasting to all users!"
      responses:
        '201':
          description: Message broadcasted
          content:
            application/json:
              schema:
                type: boolean

  /chat/create:
    post:
      tags:
        - Chat
      summary: Create or start a new chat/contact
      security:
        - BearerAuth: []
        - ClientIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - currentUserId
              properties:
                userId:
                  type: number
                  example: 2
                currentUserId:
                  type: number
                  example: 1
      responses:
        '200':
          description: Chat contact created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Chat contact created"
                  data:
                    $ref: '#/components/schemas/ChatContactDto'
        '400':
          description: Invalid input or chat creation failed
        '500':
          description: Internal server error

  /chat/action:
    post:
      tags:
        - Chat
      summary: Perform a chat action (block, mute, archive)
      operationId: chatAction
      security:
        - BearerAuth: []
        - ClientIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - currentUserId
                - action
              properties:
                userId:
                  type: string
                  example: "123"
                currentUserId:
                  type: string
                  example: "456"
                action:
                  type: string
                  enum: [BLOCK, MUTE, ARCHIVE]
                  example: BLOCK
      responses:
        '200':
          description: Chat action performed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "BLOCK successful"
        '400':
          description: Invalid input or action already performed
        '500':
          description: Internal server error

  /chat/contact:
    get:
      tags:
        - Chat
      summary: Get chat contacts for a user
      operationId: getChatContact
      security:
        - BearerAuth: []
        - ClientIdHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: number
                  example: 1
      responses:
        '200':
          description: Chat contacts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ChatContactDto'
        '400':
          description: Invalid request payload or user not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "User does not exist"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Internal server error"
                  error:
                    type: string
                    example: "Internal server error"

  /user:
    get:
      tags:
        - User
      summary: Get all users
      responses:
        '200':
          description: List of users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserBasicDto'
                  status:
                    type: boolean
                    example: true
        '400':
          description: Failed to retrieve users

  /user/{id}:
    get:
      tags:
        - User
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'

  /user/{id}/{guid}:
    get:
      tags:
        - User
      summary: Get a user by ID and Guid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: guid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User data fetched by ID and GUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBasicDto'
        '400':
          description: Invalid request or user not found

components:
  schemas:
    UserSchema:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
        - confirmPassword
        - profilePicture
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        confirmPassword:
          type: string
        profilePicture:
          type: string
          format: binary

    UserDto:
      type: object
      properties:
        id:
          type: number
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        profilePicture:
          type: string

    UserBasicDto:
      type: object
      properties:
        id:
          type: number
        firstName:
          type: string
        lastName:
          type: string

    ChatContactDto:
      type: object
      properties:
        id:
          type: number
        userId:
          type: number
        currentUserId:
          type: number
        isMuted:
          type: boolean
        isArchived:
          type: boolean
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          nullable: true
        isActive:
          type: boolean
        isDeleted:
          type: boolean

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    ClientIdHeader:
      type: apiKey
      in: header
      name: clientid
